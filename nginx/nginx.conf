worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstream API ─────────────────────────────────────────────
  upstream nexabid_api {
    server backend:3000;
    keepalive 32;
  }

  # ── Client Portal — app.nexabid.com ──────────────────────────
  server {
    listen 80;
    server_name app.nexabid.com;
    root /var/www/client;
    index index.html;

    # API proxy
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://nexabid_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }

    # Socket.io
    location /socket.io/ {
      proxy_pass http://nexabid_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }

  # ── Manufacturer Portal — mfr.nexabid.com ────────────────────
  server {
    listen 80;
    server_name mfr.nexabid.com;
    root /var/www/manufacturer;
    index index.html;

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://nexabid_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
      proxy_pass http://nexabid_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }

  # ── Admin Panel — admin.nexabid.com ──────────────────────────
  server {
    listen 80;
    server_name admin.nexabid.com;
    root /var/www/admin;
    index index.html;

    # Extra auth rate limit for admin
    location /api/auth/ {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://nexabid_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://nexabid_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
