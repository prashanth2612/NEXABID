version: '3.8'

services:
  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./nexabid-backend
      dockerfile: Dockerfile
    container_name: nexabid-backend
    restart: unless-stopped
    env_file: ./nexabid-backend/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/nexabid
      - REDIS_URL=redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexabid-net

  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: nexabid-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nexabid-net

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexabid-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - nexabid-net

  # ── Nginx reverse proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexabid-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nexabid-client/dist:/var/www/client:ro
      - ./nexabid-manufacturer/dist:/var/www/manufacturer:ro
      - ./nexabid-admin/dist:/var/www/admin:ro
    depends_on:
      - backend
    networks:
      - nexabid-net

volumes:
  mongo-data:
  redis-data:

networks:
  nexabid-net:
    driver: bridge
